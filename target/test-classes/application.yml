spring:
  application:
    name: auth-service-test
  data:
    mongodb:
      uri: mongodb://localhost:27017/auth_db_test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  rabbitmq:
    host: localhost

eureka:
  client:
    enabled: false

jwt:
  secret: testSecretKeyForUnitTestsOnlyNotForProductionMustBeAtLeast256Bits
  expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    br.com.cleanprosolutions: DEBUG
